<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand.support_header }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="main-content">
        <h1>{{ brand.name }}</h1>
        <p>Welkom bij onze klantenservice. Hoe kunnen we je helpen?</p>
        <p class="subtitle">Klik op het chat-icoon om met onze {{ brand.product_line }} expert te praten.</p>
        <p class="subtitle" style="font-size: 0.8em; margin-top: 5px;">(We also offer support in English)</p>
    </div>

    <!-- Real embeddable widget — same script Shopify loads. Same-origin here, so it
         injects its own markup + styles; the demo page owns no chat DOM of its own. -->
    <script src="{{ url_for('static', filename='widget.js') }}"
            data-api-url="{{ request.host_url.rstrip('/') }}"></script>
</body>
</html>
